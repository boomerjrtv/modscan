name: smoke
on:
  pull_request:
    branches: [ main, fix/patch-setup, '**' ]
  push:
    branches: [ main, fix/patch-setup ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -m pip install -r requirements-dev.txt
      - run: pytest -q tests/
