name: smoke
on:
  pull_request:
    branches: [ main, fix/patch-setup, "**" ]
  push:
    branches: [ main, fix/patch-setup ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECLISTS_DIR: ${{ github.workspace }}/SecLists   # any non-empty value
      MODSCAN_DISABLE_AI: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: python -m pip install -r requirements-dev.txt
      - run: pytest -q tests/
