<!DOCTYPE html>
<html>
<head>
    <title>Test Template Fix</title>
    <style>
        .screenshot-indicator { 
            background: #2563eb; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 3px; 
            text-decoration: none;
            font-size: 10px;
        }
        .no-screenshot { 
            color: #666; 
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h1>Screenshot/Response Display Test</h1>
    <table border="1">
        <tr>
            <th>URL</th>
            <th>Screenshot</th>
            <th>Response</th>
        </tr>
        <tbody id="asset-table"></tbody>
    </table>
    
    <script>
    async function testDisplay() {
        try {
            // Fetch mapping
            const mappingResponse = await fetch('/api/asset_mapping');
            const globalConfig = await mappingResponse.json();
            const assetMapping = globalConfig.field_mappings;
            
            console.log('Loaded mapping:', assetMapping);
            
            // Fetch assets
            const assetsResponse = await fetch('/api/assets?limit=5');
            const assetsData = await assetsResponse.json();
            
            const tbody = document.getElementById('asset-table');
            
            assetsData.assets.forEach(asset => {
                // Test screenshot logic
                const screenshotPath = asset[assetMapping.screenshot];
                console.log('Testing asset:', asset.url, 'Screenshot path:', screenshotPath);
                
                const hasScreenshot = screenshotPath && 
                                    screenshotPath !== 'NONE' && 
                                    screenshotPath !== '' &&
                                    !String(screenshotPath).includes('placeholder') &&
                                    String(screenshotPath).endsWith('.png');
                
                console.log('Has screenshot:', hasScreenshot, 'Conditions:', {
                    exists: !!screenshotPath,
                    notNone: screenshotPath !== 'NONE',
                    notEmpty: screenshotPath !== '',
                    noPlaceholder: !String(screenshotPath || '').includes('placeholder'),
                    endsWithPng: String(screenshotPath || '').endsWith('.png')
                });
                
                // Test response
                const responseBody = asset[assetMapping.response] || '';
                const hasResponse = responseBody.length > 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${asset.url}</td>
                    <td>
                        ${hasScreenshot ? 
                            '<a href="#" class="screenshot-indicator">VIEW</a>' : 
                            '<span class="no-screenshot">NONE</span>'
                        }
                        <br><small>${screenshotPath || 'No path'}</small>
                    </td>
                    <td>
                        ${hasResponse ? 
                            '<a href="#" class="screenshot-indicator">VIEW (' + responseBody.length + ' chars)</a>' : 
                            '<span class="no-screenshot">EMPTY</span>'
                        }
                    </td>
                `;
                tbody.appendChild(row);
            });
            
        } catch (error) {
            console.error('Error:', error);
            document.body.innerHTML += '<p style="color: red;">Error: ' + error.message + '</p>';
        }
    }
    
    testDisplay();
    </script>
</body>
</html>
